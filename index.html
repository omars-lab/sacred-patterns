    <body>

        <header class="masthead">
            <h1>Sacred Patterns</h1>
            <div class="tagline">geometric constructions in d3</div>
            <div class="rule"></div>
        </header>

        <main class="grid" id="grid"></main>

        <!-- Bottom-right hover/click debug menu — provenance, the editable
             config palette, and the whole-page SVG exports live here so the
             gallery itself stays clean. -->
        <div class="debug" id="debug">
            <button class="debug-toggle" id="debugToggle" aria-expanded="false" aria-controls="debugPanel">&#9881; debug</button>
            <div class="debug-panel" id="debugPanel" role="region" aria-label="Debug and provenance">
                <h3>build</h3>
                <div class="provenance">
                    5c2163d<br>
                    5c2163d7a5e1988c9d1f41bf671603c42fb8cc64<br>
                    master
                </div>
                <h3>theme config</h3>
                <textarea id="config" spellcheck="false">
{
    "background_theme": [
        { "background": "RGBA(8,8,12,1)",        "comment": "near-black" },
        { "background": "RGBA(0,0,0,0.9)",       "comment": "black" },
        { "background": "RGBA(255,255,255,0.9)", "comment": "white" },
        { "background": "RGBA(118,215,196,0.9)", "comment": "turquoise" }
    ],
    "line_theme": [
        { "stroke": "url(#invertedSvgGradient)", "stroke-width": "1", "comment": "inverted gradient" },
        { "stroke": "url(#svgGradient)",         "stroke-width": "1", "comment": "gradient" },
        { "stroke": "RGB(244,208,63)",           "stroke-width": "1", "comment": "gold" },
        { "stroke": "RGB(192,192,192)",          "stroke-width": "1", "comment": "silver" }
    ]
}
                </textarea>
                <div class="debug-links">
                    <a id="download" href="#">Download SVG</a>
                    <a id="download-inverted" href="#">Download Inverted SVG</a>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            // ----------------------------------------------------------------
            // Gallery: render every sacredPatterns generator into its own card.
            // ----------------------------------------------------------------
            var RADIUS = 60;            // smaller than the 100 demo radius so a
            var SIZE = 6;               // 360x360 svg fits a 440px card.
            var REC_LEVELS = 2;         // drawCirclesRecursively's depth arg.

            // Default config (the debug textarea can override and re-apply it).
            var defaultConfig = JSON.parse(document.getElementById("config").value);

            // The 8 generators, in complexity order (primitive -> composed).
            // Each `draw(mountSel, bg, line)` returns the d3 svg selection so
            // Regenerate/Download can read it back. d7 closes over REC_LEVELS.
            var PATTERNS = [
                { id: "d6", title: "Hexagon Nonagon Star", tag: "strapwork",
                  desc: "Two-ring hexagon tessellation, each cell a six-point nonagon star — the headline construction.",
                  draw: function (m, bg, line) { return sacredPatterns.drawHexagonWithSurroundingNonagons("svg-d6", RADIUS, SIZE, bg, line, m); } },
                { id: "d0", title: "Chained Stars", tag: "star",
                  desc: "Ten elongated five-point stars chained around a central decagon, each rotated to point inward.",
                  draw: function (m, bg, line) { return sacredPatterns.drawChainedStars("svg-d0", RADIUS, SIZE, bg, line, m); } },
                { id: "d2", title: "Star Grid", tag: "tiling",
                  desc: "A grid of Star-of-David motifs with inscribed hexagons, proving the hex-neighbour tiling.",
                  draw: function (m, bg, line) { return sacredPatterns.drawStarGrid("svg-d2", RADIUS, SIZE, bg, line, m); } },
                { id: "d3", title: "Rotated Star", tag: "star",
                  desc: "A single rotated star with its construction circles overlaid — the diagnostic view.",
                  draw: function (m, bg, line) { return sacredPatterns.drawRotatedStar("svg-d3", RADIUS, SIZE, bg, line, m); } },
                { id: "d7", title: "Flower of Life", tag: "flower",
                  desc: "A recursive flower-of-life with a hexagon inscribed in every circle.",
                  draw: function (m, bg, line) { return sacredPatterns.drawCirclesRecursively("svg-d7", RADIUS, SIZE, REC_LEVELS, bg, line, m); } },
                { id: "d5", title: "Rotating Circles", tag: "flower",
                  desc: "An animated flower-of-life ring whose inner band rotates against a static outer ring.",
                  draw: function (m, bg, line) { return sacredPatterns.drawRotatingCircles("svg-d5", RADIUS, SIZE, bg, line, m); } },
                { id: "d1", title: "Different Polygons", tag: "primitive", strip: true,
                  desc: "Every regular polygon, triangle through decagon, inscribed in the same circle.",
                  draw: function (m, bg, line) { return sacredPatterns.drawDifferentPolygons("svg-d1", RADIUS, SIZE, bg, line, m); } },
                { id: "d4", title: "Different Stars", tag: "star", strip: true,
                  desc: "Stars from six to eleven points at a fixed radius, isolating the visual effect of N.",
                  draw: function (m, bg, line) { return sacredPatterns.drawDifferentStars("svg-d4", RADIUS, SIZE, bg, line, m); } }
            ];

            // Resolve the selected option index back into a theme object,
            // stripping the `comment` key (it's documentation, not a CSS prop).
            function themeAt(list, index) {
                var t = Object.assign({}, list[index]);
                delete t.comment;
                return t;
            }

            // (Re)render one card's pattern into its mount, clearing any prior
            // svg first. Reads the card's two selects for bg/line palette.
            function renderCard(pattern) {
                var mountId = "mount-" + pattern.id;
                document.getElementById(mountId).innerHTML = "";
                var bgSel = document.getElementById("bg-" + pattern.id);
                var lineSel = document.getElementById("line-" + pattern.id);
                var bg = themeAt(defaultConfig.background_theme, +bgSel.value);
                var line = themeAt(defaultConfig.line_theme, +lineSel.value);
                pattern.draw("#" + mountId, bg, line);
            }

            // Serialize a card's first svg to a downloadable data URI.
            function downloadCard(pattern) {
                var svg = document.querySelector("#mount-" + pattern.id + " svg");
                if (!svg) { return; }
                svg.setAttribute("version", "1.1");
                svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                var uri = "data:image/svg+xml;base64," + window.btoa(svg.outerHTML);
                var a = document.createElement("a");
                a.href = uri;
                a.download = pattern.id + ".svg";
                a.click();
            }

            function optionLabel(t, i) {
                return t.comment ? t.comment : "option " + i;
            }

            function buildSelect(card, kind, pattern, list) {
                var wrap = card.append("div").attr("class", "control");
                wrap.append("label").text(kind === "bg" ? "background" : "line");
                var sel = wrap.append("select").attr("id", kind + "-" + pattern.id);
                list.forEach(function (t, i) {
                    sel.append("option").attr("value", i).text(optionLabel(t, i));
                });
                sel.on("change", function () { renderCard(pattern); });
            }

            function buildCards() {
                var grid = d3.select("#grid");
                PATTERNS.forEach(function (pattern, idx) {
                    var card = grid.append("div").attr("class", "card");
                    card.style("animation-delay", (idx * 60) + "ms");

                    var head = card.append("div").attr("class", "card-head");
                    head.append("h2").text(pattern.title);
                    head.append("span").attr("class", "id-chip").text(pattern.id);
                    head.append("span").attr("class", "tag tag-" + pattern.tag).text(pattern.tag);

                    card.append("div").attr("class", "card-desc").text(pattern.desc);

                    card.append("div")
                        .attr("class", "render" + (pattern.strip ? " strip" : ""))
                        .append("div").attr("id", "mount-" + pattern.id);

                    var controls = card.append("div").attr("class", "controls");
                    buildSelect(controls, "bg", pattern, defaultConfig.background_theme);
                    buildSelect(controls, "line", pattern, defaultConfig.line_theme);
                    controls.append("div").attr("class", "spacer");
                    controls.append("button").attr("class", "btn ghost")
                        .text("Regenerate")
                        .on("click", function () { renderCard(pattern); });
                    controls.append("button").attr("class", "btn")
                        .text("Download")
                        .on("click", function () { downloadCard(pattern); });

                    renderCard(pattern);
                });
            }

            buildCards();

            // ----------------------------------------------------------------
            // Debug menu: keyboard/touch toggle + whole-page SVG exports.
            // ----------------------------------------------------------------
            (function () {
                var debug = document.getElementById("debug");
                var toggle = document.getElementById("debugToggle");
                toggle.addEventListener("click", function () {
                    var open = debug.classList.toggle("open");
                    toggle.setAttribute("aria-expanded", open ? "true" : "false");
                });

                // The two global links export the headline pattern (d6) using
                // the gradient / inverted-gradient line themes respectively.
                function exportHero(lineIndex, filename) {
                    var cfg = JSON.parse(document.getElementById("config").value);
                    var bg = themeAt(cfg.background_theme, 0);
                    var line = themeAt(cfg.line_theme, lineIndex);
                    sacredPatterns.drawHexagonWithSurroundingNonagons("svg-export", RADIUS, SIZE, bg, line, "body");
                    var node = document.getElementById("svg-export");
                    node.setAttribute("version", "1.1");
                    node.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                    var uri = "data:image/svg+xml;base64," + window.btoa(node.outerHTML);
                    node.remove();
                    return { uri: uri, filename: filename };
                }

                function wireExport(linkId, lineIndex, filename) {
                    document.getElementById(linkId).addEventListener("click", function (e) {
                        e.preventDefault();
                        var out = exportHero(lineIndex, filename);
                        var a = document.createElement("a");
                        a.href = out.uri; a.download = out.filename; a.click();
                    });
                }
                wireExport("download", 1, "sacred-pattern.svg");
                wireExport("download-inverted", 0, "sacred-pattern-inverted.svg");
            })();
        </script>
