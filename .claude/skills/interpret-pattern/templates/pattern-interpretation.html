<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pattern Interpretation — {{PATTERN_NAME}}</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      display: flex; height: 100vh;
      background: #0a0a14; color: #e0e0e0;
      font-size: 12px;
    }
    #sidebar {
      width: 340px;
      border-right: 1px solid #333;
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow: hidden;
    }
    #sidebar-scroll {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #sidebar h2 { font-size: 14px; color: #7af; margin-bottom: 4px; }
    #sidebar h3 { font-size: 12px; color: #888; margin-bottom: 4px; }
    #canvas {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 12px;
    }
    #main-svg {
      max-width: 100%; max-height: 100%;
      border: 1px solid #333; border-radius: 4px;
    }

    /* Shape list */
    .shape-item {
      padding: 6px 8px; border: 1px solid #333; border-radius: 4px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .shape-item:hover { border-color: #555; }
    .shape-item.selected { border-color: #7af; background: rgba(119,170,255,0.1); }
    .shape-item .swatch {
      width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
    }
    .shape-item .shape-label { flex: 1; }
    .shape-item .shape-count { color: #888; font-size: 11px; }

    /* Property editors */
    #property-editor { border-top: 1px solid #333; padding-top: 10px; }
    .prop-group { margin-bottom: 6px; }
    .prop-group label {
      display: block; font-size: 10px; color: #888;
      margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .prop-group input, .prop-group select, .prop-group textarea {
      width: 100%; padding: 4px 6px; background: #1a1a2e; color: #e0e0e0;
      border: 1px solid #333; border-radius: 3px; font-family: inherit;
      font-size: 12px;
    }
    .prop-group input:focus, .prop-group select:focus, .prop-group textarea:focus {
      border-color: #7af; outline: none;
    }
    .prop-row { display: flex; gap: 8px; }
    .prop-row .prop-group { flex: 1; }

    /* Feedback */
    #global-feedback { border-top: 1px solid #333; padding-top: 10px; }
    #global-feedback textarea { resize: vertical; min-height: 60px; }

    /* Toolbar */
    #toolbar {
      display: flex; gap: 4px; align-items: center;
      border-bottom: 1px solid #333; padding: 8px 12px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 32px; height: 32px; padding: 4px;
      border: 1px solid #555; border-radius: 6px;
      background: #1a1a2e; color: #e0e0e0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative; transition: background 0.15s, border-color 0.15s;
    }
    .icon-btn svg { width: 18px; height: 18px; }
    .icon-btn:hover:not(:disabled) { background: #2a2a4e; border-color: #777; }
    .icon-btn:disabled { opacity: 0.35; cursor: default; }
    .icon-btn.active { background: #2a3a5a; border-color: #7af; color: #7af; }

    /* Per-button colors */
    #btn-delete { border-color: #a44; color: #f88; }
    #btn-delete:hover:not(:disabled) { background: #3a1a1a; }
    #btn-deselect { border-color: #666; }
    #btn-group, #btn-ungroup { border-color: #6c5ce7; color: #c3b1ff; }
    #btn-group:hover:not(:disabled), #btn-ungroup:hover:not(:disabled) { background: #2a1a4a; }
    #btn-reset { border-color: #a86; color: #fc8; }
    #btn-reset:hover:not(:disabled) { background: #3a2a1a; }
    .done-btn {
      background: #1a3a1a; border-color: #4a8a4a; color: #8f8;
      flex-grow: 1; font-weight: bold;
    }
    .done-btn:hover { background: #2a5a2a; }
    .done-btn.saved { background: #4a8a4a; color: #fff; }

    /* Tooltip on hover */
    .icon-btn::after {
      content: attr(title); position: absolute;
      bottom: -28px; left: 50%; transform: translateX(-50%);
      background: #222; color: #ccc; font-size: 10px;
      padding: 2px 6px; border-radius: 3px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 100;
    }
    .icon-btn:hover::after { opacity: 1; }

    .toolbar-divider {
      width: 1px; height: 24px; background: #444; margin: 0 2px;
    }
    #selection-badge {
      font-size: 10px; color: #7af; padding: 2px 6px;
      border: 1px solid #7af; border-radius: 10px;
      white-space: nowrap; margin-left: auto;
      display: none;
    }
    #selection-badge.visible { display: inline-block; }

    /* Status bar */
    #status {
      font-size: 10px; color: #666; text-align: center; padding: 4px;
      border-top: 1px solid #222;
    }

    /* Drag handles */
    .drag-handle {
      fill: #fff; stroke: #7af; stroke-width: 2;
      cursor: grab; transition: r 0.15s, fill 0.15s, stroke-width 0.15s;
    }
    .drag-handle:hover { r: 7; }
    .drag-handle.active { fill: #4ecdc4; stroke: #fff; r: 6; }
    .drag-handle.dragging {
      r: 2; fill: #ff6b6b; stroke: #fff; stroke-width: 1.5;
      cursor: crosshair;
    }
    .drag-crosshair { stroke: rgba(255,107,107,0.6); stroke-width: 0.5; pointer-events: none; }
    .edge-midpoint {
      fill: #1a1a2e; stroke: #4ecdc4; stroke-width: 1.5;
      cursor: pointer; opacity: 0.7; transition: opacity 0.15s, r 0.1s;
    }
    .edge-midpoint:hover { opacity: 1; r: 7; }
    .edge-midpoint-plus {
      fill: #4ecdc4; font-size: 10px; font-weight: bold;
      pointer-events: none; text-anchor: middle; dominant-baseline: central;
    }

    .tool-row { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 6px; }
    .tool-row label { color: #888; cursor: pointer; user-select: none; }
    .tool-row input[type="checkbox"] { cursor: pointer; }

    /* Preview dots for add mode */
    .preview-dot { fill: #7af; stroke: #fff; stroke-width: 1; }
    .preview-line { stroke: #7af; stroke-width: 1; stroke-dasharray: 4,3; opacity: 0.6; }

    /* Group headers in shape list */
    .group-header {
      padding: 6px 8px; border: 1px solid #6c5ce7; border-radius: 4px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      background: rgba(108,92,231,0.08); transition: background 0.15s;
      margin-bottom: 2px;
    }
    .group-header:hover { background: rgba(108,92,231,0.15); }
    .group-header .group-toggle { color: #6c5ce7; font-size: 10px; width: 14px; text-align: center; flex-shrink: 0; }
    .group-header .group-label { flex: 1; color: #c3b1ff; font-size: 11px; }
    .group-header .group-count { color: #888; font-size: 11px; }

    .shape-item.grouped { margin-left: 16px; border-left: 2px solid #6c5ce7; }
    .shape-item.grouped.derived { opacity: 0.55; cursor: default; }
    .shape-item.grouped.derived .shape-label { font-style: italic; }
    .shape-item.multi-selected { border-color: #9b7aff; border-style: dashed; background: rgba(155,122,255,0.12); }
    .shape-item.primary-selected { border-color: #7af; border-style: solid; background: rgba(119,170,255,0.15); }
    .picking-center-mode { cursor: crosshair !important; }

    /* Relationship editor */
    .relationship-section { border-top: 1px solid #333; padding-top: 8px; margin-top: 8px; }
    .relationship-section h3 { font-size: 12px; color: #4ecdc4; margin-bottom: 6px; }
    .rel-row {
      display: flex; align-items: center; gap: 4px; margin-bottom: 4px;
      padding: 4px; background: #1a1a2e; border-radius: 3px; flex-wrap: wrap;
    }
    .rel-row select, .rel-row input {
      padding: 2px 4px; background: #0a0a14; color: #e0e0e0;
      border: 1px solid #333; border-radius: 3px; font-family: inherit; font-size: 11px;
    }
    .rel-row select { max-width: 110px; }
    .rel-row input { max-width: 70px; }
    .rel-row .rel-notes { flex: 1; min-width: 60px; }
    .rel-row .rel-delete {
      background: none; border: none; color: #f88; cursor: pointer;
      font-size: 14px; padding: 0 4px; flex-shrink: 0;
    }
    .btn-add-rel {
      width: 100%; padding: 4px; background: none;
      border: 1px dashed #4ecdc4; border-radius: 3px;
      color: #4ecdc4; cursor: pointer; font-family: inherit; font-size: 11px;
      margin-top: 4px;
    }
    .btn-add-rel:hover { background: rgba(78,205,196,0.1); }

    /* Group properties section */
    .group-props { border-top: 1px solid #6c5ce7; padding-top: 8px; margin-bottom: 8px; }
    .group-props h3 { font-size: 12px; color: #c3b1ff; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="toolbar">
      <button id="btn-add" class="icon-btn" title="Add Shape">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button id="btn-delete" class="icon-btn" title="Delete Selected" disabled>
        <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2V6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button id="btn-deselect" class="icon-btn" title="Deselect All" disabled>
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><line x1="8" y1="8" x2="16" y2="16" stroke="currentColor" stroke-width="2"/><line x1="16" y1="8" x2="8" y2="16" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="toolbar-divider"></div>
      <button id="btn-group" class="icon-btn" title="Group as Rotations" disabled>
        <svg viewBox="0 0 24 24"><path d="M10,13a5,5,0,0,0,7.54.54l3-3a5,5,0,0,0-7.07-7.07L12,4.93" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14,11a5,5,0,0,0-7.54-.54l-3,3a5,5,0,0,0,7.07,7.07L12,19.07" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button id="btn-ungroup" class="icon-btn" title="Ungroup" disabled>
        <svg viewBox="0 0 24 24"><path d="M10,13a5,5,0,0,0,7.54.54l3-3a5,5,0,0,0-7.07-7.07" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="3,3"/><path d="M14,11a5,5,0,0,0-7.54-.54l-3,3a5,5,0,0,0,7.07,7.07" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="3,3"/></svg>
      </button>
      <div class="toolbar-divider"></div>
      <button id="btn-reset" class="icon-btn" title="Reset All Changes">
        <svg viewBox="0 0 24 24"><polyline points="1,4 1,10 7,10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.51,15a9,9,0,1,0,2.13-9.36L1,10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <span id="selection-badge"></span>
      <button id="btn-done" class="icon-btn done-btn" title="Done — Serialize Output">
        <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div id="sidebar-scroll">
      <h2>Shape Inventory</h2>
      <div id="shape-list"></div>

      <div id="property-editor">
        <h3>Properties</h3>
        <div id="prop-fields"><span style="color:#666">Select a shape to edit</span></div>
      </div>

      <div id="global-feedback">
        <h3>Global Feedback</h3>
        <textarea id="feedback-text" placeholder="Notes about the overall pattern interpretation..."></textarea>
      </div>

      <div class="tool-row">
        <input type="checkbox" id="toggle-edges">
        <label for="toggle-edges">Show Edges</label>
      </div>

      <div id="status">Click shapes to select. Drag handles to adjust vertices.</div>
    </div>
  </div>

  <div id="canvas"></div>

  <!-- Serialized output (written by Done button) -->
  <script type="application/json" id="interpretation-data"></script>

  <script>
    // ============================================================
    // Configuration
    // ============================================================
    const WIDTH = {{WIDTH}}, HEIGHT = {{HEIGHT}};
    const REFERENCE_IMAGE_PATH = '{{REFERENCE_IMAGE_PATH}}';

    const OVERLAY_COLORS = [
      '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4',
      '#ffeaa7', '#fd79a8', '#6c5ce7', '#00b894',
      '#e17055', '#0984e3', '#fdcb6e', '#dfe6e9',
    ];

    // Pattern metadata
    const patternMeta = {{PATTERN_META_JSON}};

    // Zone definitions (normalized 0-1 relative to R)
    const zones = {{ZONES_JSON}};

    // ============================================================
    // Initial shape inventory (extracted by tools/extract-shapes.py)
    // Vertices in normalized image coords (0-1), derived from
    // color segmentation + boundary tracing of reference.jpg
    // ============================================================

    let shapes = {{SHAPES_JSON}};
    // ============================================================
    // State
    // ============================================================
    // Deep copy of initial shapes for Reset
    const initialShapes = JSON.parse(JSON.stringify(shapes));

    let selectedIds = new Set();
    let lastClickedId = null;  // anchor for shift-click range select
    let addMode = false;
    let newVertices = [];
    let groups = [];
    let selectedVertexIndex = null;  // Which vertex handle is "active" (shows +  on its edges)
    let pickingCenterMode = false;   // "Click a shape to set rotation center"
    let pendingGroupMembers = [];    // member IDs awaiting center pick

    // Backfill prototype_id for groups created before this feature
    groups.forEach(g => {
      if (!g.prototype_id && g.member_ids.length > 0) {
        g.prototype_id = g.member_ids[0];
      }
    });

    const initialGroups = JSON.parse(JSON.stringify(groups));

    // Multi-select helpers
    function isSelected(id) { return selectedIds.has(id); }
    function primarySelectedId() {
      if (selectedIds.size === 0) return null;
      return [...selectedIds][0];
    }
    function primarySelectedShape() {
      const id = primarySelectedId();
      return id ? shapes.find(s => s.id === id) : null;
    }
    function getGroup(groupId) { return groups.find(g => g.id === groupId); }
    function getShapeGroup(shapeId) {
      const shape = shapes.find(s => s.id === shapeId);
      return shape && shape.group ? getGroup(shape.group) : null;
    }
    function computeCentroid(shape) {
      const verts = shape.approximate_vertices;
      const cx = verts.reduce((s, v) => s + v[0], 0) / verts.length;
      const cy = verts.reduce((s, v) => s + v[1], 0) / verts.length;
      return [cx, cy];
    }

    // ============================================================
    // SVG Setup
    // ============================================================
    const svg = d3.select('#canvas')
      .append('svg')
      .attr('id', 'main-svg')
      .attr('width', WIDTH)
      .attr('height', HEIGHT)
      .attr('viewBox', `0 0 ${WIDTH} ${HEIGHT}`);

    // Reference image layer
    svg.append('image')
      .attr('href', REFERENCE_IMAGE_PATH)
      .attr('width', WIDTH)
      .attr('height', HEIGHT)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    // Edge overlay layer (pre-generated by extract-shapes.py)
    const EDGE_OVERLAY_PATH = 'edges.png';
    const edgeOverlay = svg.append('image')
      .attr('id', 'edge-overlay')
      .attr('href', EDGE_OVERLAY_PATH)
      .attr('width', WIDTH)
      .attr('height', HEIGHT)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .attr('opacity', 0.6)
      .style('display', 'none');  // Initially hidden

    // Toggle edge overlay
    d3.select('#toggle-edges').on('change', function() {
      edgeOverlay.style('display', this.checked ? 'block' : 'none');
    });

    // Overlay group
    const overlayGroup = svg.append('g').attr('id', 'overlays');

    // Handle group (above overlays)
    const handleGroup = svg.append('g').attr('id', 'handles');

    // Preview group for add mode
    const previewGroup = svg.append('g').attr('id', 'preview');

    // Click handler for add mode + deselect + center-picking cancel
    svg.on('click', function(event) {
      if (pickingCenterMode) {
        // Clicked on background while picking center — cancel
        if (event.target === this.querySelector('rect') || event.target.tagName === 'svg' || event.target.tagName === 'image') {
          exitPickingCenterMode();
          d3.select('#status').text('Group creation cancelled.');
        }
        return;
      }
      if (addMode) {
        const [x, y] = d3.pointer(event);
        newVertices.push([x / WIDTH, y / HEIGHT]);
        renderPreview();
      } else if (selectedIds.size > 0 && (event.target === this.querySelector('rect') || event.target.tagName === 'svg' || event.target.tagName === 'image')) {
        // Clicked on background — deselect all
        selectedIds.clear();
        selectedVertexIndex = null;
        renderAll();
      }
    });

    function exitPickingCenterMode() {
      pickingCenterMode = false;
      pendingGroupMembers = [];
      d3.select('#btn-group').classed('active', false);
      d3.select('#main-svg').classed('picking-center-mode', false);
      renderAll();
    }

    // ============================================================
    // Drag behavior — vertex handles
    // ============================================================
    const MERGE_SNAP_PX = 8; // merge vertices closer than 8px

    const drag = d3.drag()
      .on('start', function(event, d) {
        const el = d3.select(this);
        el.raise().classed('dragging', true);
        // Hide non-adjacent vertex handles; show adjacent ones as merge targets
        const shape = shapes.find(s => s.id === d.shapeId);
        const n = shape ? shape.approximate_vertices.length : 0;
        const prevIdx = (d.vertexIndex - 1 + n) % n;
        const nextIdx = (d.vertexIndex + 1) % n;
        handleGroup.selectAll('.drag-handle').each(function(hd) {
          if (hd.shapeId === d.shapeId && hd.vertexIndex !== d.vertexIndex) {
            if (hd.vertexIndex === prevIdx || hd.vertexIndex === nextIdx) {
              // Show adjacent vertices as small merge targets
              d3.select(this).attr('visibility', 'visible')
                .attr('r', 3).attr('fill', '#888').attr('stroke', '#fff').attr('stroke-width', 1);
            } else {
              d3.select(this).attr('visibility', 'hidden');
            }
          }
        });
        // Hide edge midpoint buttons during drag
        handleGroup.selectAll('.edge-midpoint').attr('visibility', 'hidden');
        // Draw crosshair lines through vertex for pinpoint placement
        const cx = +el.attr('cx'), cy = +el.attr('cy');
        handleGroup.append('line').attr('class', 'drag-crosshair')
          .attr('x1', cx).attr('y1', 0).attr('x2', cx).attr('y2', HEIGHT);
        handleGroup.append('line').attr('class', 'drag-crosshair')
          .attr('x1', 0).attr('y1', cy).attr('x2', WIDTH).attr('y2', cy);
      })
      .on('drag', function(event, d) {
        const x = Math.max(0, Math.min(WIDTH, event.x));
        const y = Math.max(0, Math.min(HEIGHT, event.y));
        d3.select(this).attr('cx', x).attr('cy', y);
        d.vertex[0] = x / WIDTH;
        d.vertex[1] = y / HEIGHT;
        updatePolygonPoints(d.shapeId);
        // Update crosshair lines to follow vertex
        const lines = handleGroup.selectAll('.drag-crosshair');
        lines.filter(function(_, i) { return i === 0; })
          .attr('x1', x).attr('x2', x);
        lines.filter(function(_, i) { return i === 1; })
          .attr('y1', y).attr('y2', y);
        // Highlight adjacent vertex if within merge snap distance
        handleGroup.selectAll('.drag-handle').each(function(hd) {
          if (hd.shapeId === d.shapeId && hd.vertexIndex !== d.vertexIndex) {
            const hx = +d3.select(this).attr('cx'), hy = +d3.select(this).attr('cy');
            const dist = Math.sqrt((x - hx) ** 2 + (y - hy) ** 2);
            if (dist < MERGE_SNAP_PX) {
              d3.select(this).attr('fill', '#ff6b6b').attr('r', 5).attr('stroke', '#fff');
            } else {
              d3.select(this).attr('fill', '#888').attr('r', 3).attr('stroke', '#fff');
            }
          }
        });
      })
      .on('end', function(event, d) {
        d3.select(this).classed('dragging', false);
        // Remove crosshair lines
        handleGroup.selectAll('.drag-crosshair').remove();

        // Check for merge with adjacent vertex
        const shape = shapes.find(s => s.id === d.shapeId);
        if (shape && shape.approximate_vertices.length > 3) {
          const verts = shape.approximate_vertices;
          const n = verts.length;
          const myX = d.vertex[0] * WIDTH, myY = d.vertex[1] * HEIGHT;
          const prevIdx = (d.vertexIndex - 1 + n) % n;
          const nextIdx = (d.vertexIndex + 1) % n;

          for (const adjIdx of [prevIdx, nextIdx]) {
            const adjX = verts[adjIdx][0] * WIDTH, adjY = verts[adjIdx][1] * HEIGHT;
            const dist = Math.sqrt((myX - adjX) ** 2 + (myY - adjY) ** 2);
            if (dist < MERGE_SNAP_PX) {
              // Merge: keep the adjacent vertex, remove the dragged one
              verts.splice(d.vertexIndex, 1);
              shape.vertex_count = verts.length;
              selectedVertexIndex = null;
              renderAll();
              d3.select('#status').text(
                `Merged vertex ${d.vertexIndex} into vertex ${adjIdx} on "${shape.id}". ${verts.length} vertices remain.`
              );
              return;
            }
          }
        }

        // Re-show all handles
        handleGroup.selectAll('.drag-handle').attr('visibility', 'visible');
        renderOverlays();
      });

    // ============================================================
    // Drag behavior — whole shape translation
    // ============================================================
    const shapeDrag = d3.drag()
      .on('start', function(event, d) {
        d._dragStartX = event.x;
        d._dragStartY = event.y;
        d._didMove = false;
        d._dragStartVerts = d.shape.approximate_vertices.map(v => [v[0], v[1]]);
      })
      .on('drag', function(event, d) {
        const dx = (event.x - d._dragStartX) / WIDTH;
        const dy = (event.y - d._dragStartY) / HEIGHT;
        // Only count as move if dragged more than 2px
        if (Math.abs(event.x - d._dragStartX) > 2 || Math.abs(event.y - d._dragStartY) > 2) {
          d._didMove = true;
        }
        d.shape.approximate_vertices.forEach((v, i) => {
          v[0] = d._dragStartVerts[i][0] + dx;
          v[1] = d._dragStartVerts[i][1] + dy;
        });
        updatePolygonPoints(d.shape.id);
        // Update handle positions too
        handleGroup.selectAll('.drag-handle').each(function(hd) {
          if (hd.shapeId === d.shape.id) {
            d3.select(this)
              .attr('cx', hd.vertex[0] * WIDTH)
              .attr('cy', hd.vertex[1] * HEIGHT);
          }
        });
      })
      .on('end', function(event, d) {
        // If no significant movement, treat as click-to-deselect
        if (!d._didMove) {
          selectedIds.clear();
          selectedVertexIndex = null;
          renderAll();
        }
      });

    function updatePolygonPoints(shapeId) {
      const shape = shapes.find(s => s.id === shapeId);
      if (!shape) return;
      overlayGroup.select(`[data-shape-id="${shapeId}"]`)
        .attr('points', shape.approximate_vertices
          .map(v => `${v[0] * WIDTH},${v[1] * HEIGHT}`).join(' '));
    }

    // ============================================================
    // Rendering
    // ============================================================
    function renderAll() {
      renderOverlays();
      renderRelationshipLines();
      renderShapeList();
      renderPropertyEditor();
      updateToolbarState();
    }

    function isDerivedGroupMember(shapeId) {
      const shape = shapes.find(s => s.id === shapeId);
      if (!shape || !shape.group) return false;
      const group = getGroup(shape.group);
      return group && group.prototype_id && group.prototype_id !== shapeId;
    }

    function renderOverlays() {
      overlayGroup.selectAll('*').remove();
      handleGroup.selectAll('*').remove();

      const primaryId = primarySelectedId();

      shapes.forEach(shape => {
        if (shape.visible === false) return;
        const sel = isSelected(shape.id);
        const isPrimary = shape.id === primaryId;
        const isDerived = isDerivedGroupMember(shape.id);

        const isMultiNonPrimary = sel && !isPrimary && selectedIds.size > 1;
        const poly = overlayGroup.append('polygon')
          .attr('points', shape.approximate_vertices
            .map(v => `${v[0] * WIDTH},${v[1] * HEIGHT}`).join(' '))
          .attr('fill', shape.overlay_color)
          .attr('fill-opacity', isDerived ? 0.15 : (sel ? (isPrimary ? 0.45 : 0.35) : 0.25))
          .attr('stroke', isDerived ? shape.overlay_color : (sel ? (isPrimary ? '#fff' : '#c3b1ff') : shape.overlay_color))
          .attr('stroke-width', sel && !isDerived ? 2.5 : 1.5)
          .attr('stroke-opacity', isDerived ? 0.5 : 0.9)
          .attr('stroke-dasharray', isDerived ? '4,4' : (isMultiNonPrimary ? '6,3' : 'none'))
          .attr('data-shape-id', shape.id)
          .style('cursor', pickingCenterMode ? 'crosshair' : (isDerived ? 'default' : (sel ? 'move' : 'pointer')));

        if (pickingCenterMode) {
          // In center-picking mode, every shape is clickable to set center
          poly.on('click', function(event) {
            event.stopPropagation();
            createGroupWithCenter(shape);
          });
        } else if (isDerived) {
          // Derived shapes redirect click to the prototype
          poly.on('click', function(event) {
            event.stopPropagation();
            const group = getShapeGroup(shape.id);
            if (group && group.prototype_id) {
              selectShape(group.prototype_id, event);
            }
          });
        } else if (isPrimary) {
          // Whole-shape drag on the polygon body (primary only)
          poly.datum({ shape: shape })
            .call(shapeDrag);
        } else if (!sel) {
          poly.on('click', function(event) {
            event.stopPropagation();
            selectShape(shape.id, event);
          });
        } else {
          // Selected but not primary — click to toggle in multi-select
          poly.on('click', function(event) {
            event.stopPropagation();
            selectShape(shape.id, event);
          });
        }

        // Draw drag handles only for primary selected shape (not derived)
        if (isPrimary && !isDerived) {
          const verts = shape.approximate_vertices;
          const n = verts.length;

          verts.forEach((v, i) => {
            const isActiveVert = (selectedVertexIndex === i);
            const handle = handleGroup.append('circle')
              .attr('class', 'drag-handle' + (isActiveVert ? ' active' : ''))
              .attr('cx', v[0] * WIDTH)
              .attr('cy', v[1] * HEIGHT)
              .attr('r', isActiveVert ? 6 : 5)
              .datum({ shapeId: shape.id, vertexIndex: i, vertex: v })
              .call(drag);

            // Double-click detection: state lives on the shape object so it
            // survives DOM re-renders. The first click delays its action;
            // a second click within 400ms cancels it and inserts a vertex.
            handle.on('click', function(event) {
              event.stopPropagation();
              const now = Date.now();
              const elapsed = now - (shape._lastVertexClickTime || 0);
              const sameVertex = (shape._lastVertexClickIndex === i);
              shape._lastVertexClickTime = now;
              shape._lastVertexClickIndex = i;

              if (elapsed < 400 && sameVertex) {
                // Double-click detected — insert vertex
                if (shape._vertexClickTimer) { clearTimeout(shape._vertexClickTimer); shape._vertexClickTimer = null; }
                const nextIdx = (i + 1) % n;
                const vCurr = verts[i];
                const vNext = verts[nextIdx];
                const newVert = [(vCurr[0] + vNext[0]) / 2, (vCurr[1] + vNext[1]) / 2];
                const insertAt = (nextIdx === 0) ? n : nextIdx;
                shape.approximate_vertices.splice(insertAt, 0, newVert);
                shape.vertex_count = shape.approximate_vertices.length;
                selectedVertexIndex = null;
                renderAll();
                d3.select('#status').text(`Inserted vertex after vertex ${i} on "${shape.id}". ${shape.approximate_vertices.length} vertices now.`);
                return;
              }

              // Single click — delay to allow second click
              if (shape._vertexClickTimer) { clearTimeout(shape._vertexClickTimer); shape._vertexClickTimer = null; }
              const shiftKey = event.shiftKey;
              shape._vertexClickTimer = setTimeout(() => {
                shape._vertexClickTimer = null;
                if (shiftKey && n > 3) {
                  shape.approximate_vertices.splice(i, 1);
                  shape.vertex_count = shape.approximate_vertices.length;
                  selectedVertexIndex = null;
                  renderAll();
                  d3.select('#status').text(`Removed vertex ${i} from "${shape.id}". ${shape.approximate_vertices.length} vertices remain.`);
                } else {
                  selectedVertexIndex = (selectedVertexIndex === i) ? null : i;
                  renderOverlays();
                  renderRelationshipLines();
                }
              }, 400);
            });
          });

          // Draw "+" midpoint buttons only on edges connected to the active vertex
          if (selectedVertexIndex !== null && selectedVertexIndex < n) {
            // Two edges: (prev -> active) and (active -> next)
            const activeIdx = selectedVertexIndex;
            const prevIdx = (activeIdx - 1 + n) % n;
            const edgesToShow = [
              { from: prevIdx, to: activeIdx },   // edge before active vertex
              { from: activeIdx, to: (activeIdx + 1) % n }  // edge after active vertex
            ];

            edgesToShow.forEach(({ from, to }) => {
              const vFrom = verts[from];
              const vTo = verts[to];
              const mx = (vFrom[0] + vTo[0]) / 2 * WIDTH;
              const my = (vFrom[1] + vTo[1]) / 2 * HEIGHT;

              handleGroup.append('circle')
                .attr('class', 'edge-midpoint')
                .attr('cx', mx).attr('cy', my)
                .attr('r', 6)
                .on('click', function(event) {
                  event.stopPropagation();
                  const insertIdx = Math.max(from, to);
                  // Special case: wrapping edge (last->first) inserts at end
                  const insertAt = (from === n - 1 && to === 0) ? n : insertIdx;
                  const newVert = [(vFrom[0] + vTo[0]) / 2, (vFrom[1] + vTo[1]) / 2];
                  shape.approximate_vertices.splice(insertAt, 0, newVert);
                  shape.vertex_count = shape.approximate_vertices.length;
                  selectedVertexIndex = null;
                  renderAll();
                  d3.select('#status').text(`Inserted vertex on "${shape.id}". ${shape.approximate_vertices.length} vertices now.`);
                });

              handleGroup.append('text')
                .attr('class', 'edge-midpoint-plus')
                .attr('x', mx).attr('y', my)
                .text('+');
            });
          }
        }
      });

      // Draw crosshair at rotation center for selected group
      const primaryShape = primarySelectedShape();
      if (primaryShape && primaryShape.group) {
        const group = getGroup(primaryShape.group);
        if (group) {
          const cx = group.rotation_center[0] * WIDTH;
          const cy = group.rotation_center[1] * HEIGHT;
          const size = 8;
          // Crosshair lines
          handleGroup.append('line')
            .attr('x1', cx - size).attr('y1', cy)
            .attr('x2', cx + size).attr('y2', cy)
            .attr('stroke', '#ff6b6b').attr('stroke-width', 2).attr('opacity', 0.9);
          handleGroup.append('line')
            .attr('x1', cx).attr('y1', cy - size)
            .attr('x2', cx).attr('y2', cy + size)
            .attr('stroke', '#ff6b6b').attr('stroke-width', 2).attr('opacity', 0.9);
          // Center dot
          handleGroup.append('circle')
            .attr('cx', cx).attr('cy', cy).attr('r', 3)
            .attr('fill', '#ff6b6b').attr('fill-opacity', 0.8)
            .attr('stroke', '#fff').attr('stroke-width', 1);
        }
      }
    }

    function renderShapeList() {
      const list = d3.select('#shape-list');
      list.selectAll('*').remove();

      // Collect grouped shape IDs
      const groupedIds = new Set();
      groups.forEach(g => g.member_ids.forEach(id => groupedIds.add(id)));

      // Render groups first
      groups.forEach(group => {
        const header = list.append('div')
          .attr('class', 'group-header')
          .on('click', () => {
            group._collapsed = !group._collapsed;
            renderShapeList();
          });

        header.append('span')
          .attr('class', 'group-toggle')
          .text(group._collapsed ? '▶' : '▼');

        header.append('span')
          .attr('class', 'group-label')
          .text(group.label || group.id);

        header.append('span')
          .attr('class', 'group-count')
          .text(`(${group.member_ids.length})`);

        // Render member shapes if not collapsed
        if (!group._collapsed) {
          group.member_ids.forEach(memberId => {
            const shape = shapes.find(s => s.id === memberId);
            if (!shape) return;
            renderShapeItem(list, shape, true);
          });
        }
      });

      // Render ungrouped shapes
      shapes.forEach(shape => {
        if (groupedIds.has(shape.id)) return;
        renderShapeItem(list, shape, false);
      });
    }

    function renderShapeItem(parent, shape, isGrouped) {
      const sel = isSelected(shape.id);
      const isDerived = isDerivedGroupMember(shape.id);
      let cls = 'shape-item';
      if (sel) cls += ' selected';
      if (isGrouped) cls += ' grouped';
      if (isDerived) cls += ' derived';
      const isPrimary = shape.id === primarySelectedId();
      if (selectedIds.size > 1 && sel && !isPrimary) cls += ' multi-selected';
      if (selectedIds.size > 1 && isPrimary) cls += ' primary-selected';

      const item = parent.append('div')
        .attr('class', cls)
        .on('click', (event) => {
          if (isDerived) {
            // Redirect to prototype
            const group = getShapeGroup(shape.id);
            if (group && group.prototype_id) {
              selectShape(group.prototype_id, event);
            }
          } else {
            selectShape(shape.id, event);
          }
        });

      item.append('input')
        .attr('type', 'checkbox')
        .property('checked', shape.visible !== false)
        .on('click', function(event) { event.stopPropagation(); })
        .on('change', function() {
          shape.visible = this.checked;
          renderOverlays();
          renderRelationshipLines();
        });

      item.append('div')
        .attr('class', 'swatch')
        .style('background', shape.overlay_color);

      const labelText = isDerived ? `${shape.id} (derived)` : shape.id;
      item.append('span')
        .attr('class', 'shape-label')
        .text(labelText);

      item.append('span')
        .attr('class', 'shape-count')
        .text(`${shape.vertex_count}v ×${shape.count}`);
    }

    function renderPropertyEditor() {
      const fields = d3.select('#prop-fields');
      fields.html('');

      const shape = primarySelectedShape();
      if (!shape) {
        fields.html('<span style="color:#666">Select a shape to edit</span>');
        return;
      }

      // If shape is grouped, show group properties first
      if (shape.group) {
        const group = getGroup(shape.group);
        if (group) {
          renderGroupProperties(fields, group);
        }
      }

      // ID
      addField(fields, 'id', 'ID', 'text', shape.id, v => {
        // Update group member_ids if shape is grouped
        if (shape.group) {
          const g = getGroup(shape.group);
          if (g) {
            const idx = g.member_ids.indexOf(shape.id);
            if (idx >= 0) g.member_ids[idx] = v;
          }
        }
        // Update relationship targets referencing old ID
        const oldId = shape.id;
        shapes.forEach(s => {
          if (s.relationships) {
            s.relationships.forEach(r => { if (r.target === oldId) r.target = v; });
          }
        });
        shape.id = v;
        // Update selectedIds
        selectedIds.delete(oldId);
        selectedIds.add(v);
        renderShapeList();
      });

      // Type + Zone row
      const row1 = fields.append('div').attr('class', 'prop-row');
      addSelect(row1, 'type', 'Type', shape.type,
        ['star','polygon','kite','petal','rhombus','pentagon','hexagon','bowtie','band-segment','custom'],
        v => { shape.type = v; });
      addSelect(row1, 'zone', 'Zone', shape.zone,
        ['inner-star','rosette','transition','satellite','outer'],
        v => { shape.zone = v; });

      // Vertex count + Count row
      const row2 = fields.append('div').attr('class', 'prop-row');
      addField(row2, 'vertex_count', 'Vertices', 'number', shape.vertex_count, v => { shape.vertex_count = +v; });
      addField(row2, 'count', 'Count', 'number', shape.count, v => { shape.count = +v; });

      // Tolerance + Area row
      const row3 = fields.append('div').attr('class', 'prop-row');
      addField(row3, 'count_tolerance', 'Count Tol.', 'number', shape.count_tolerance || 0, v => { shape.count_tolerance = +v; });
      addField(row3, 'area_ratio', 'Area Ratio', 'number', shape.approximate_area_ratio || '', v => {
        shape.approximate_area_ratio = v === '' ? null : +v;
      }, '0.01');

      // Notes
      const noteGroup = fields.append('div').attr('class', 'prop-group');
      noteGroup.append('label').text('Notes');
      noteGroup.append('textarea')
        .attr('rows', 3)
        .property('value', shape.notes || '')
        .on('input', function() { shape.notes = this.value; });

      // Relationships section
      renderRelationshipsEditor(fields, shape);
    }

    function renderGroupProperties(parent, group) {
      const section = parent.append('div').attr('class', 'group-props');
      section.append('h3').text('Group Properties');

      addField(section, 'group-label', 'Label', 'text', group.label || group.id, v => {
        group.label = v;
        renderShapeList();
      });

      const row1 = section.append('div').attr('class', 'prop-row');
      addField(row1, 'group-count', 'Count', 'number', group.count, v => { group.count = +v; });
      addField(row1, 'group-spacing', 'Angle Spacing', 'number', group.angular_spacing, v => { group.angular_spacing = +v; });

      const row2 = section.append('div').attr('class', 'prop-row');
      addField(row2, 'rot-cx', 'Center X', 'number', group.rotation_center[0].toFixed(4), v => {
        group.rotation_center[0] = +v;
        propagateVertexEdit(group.prototype_id);
        renderOverlays();
      }, '0.001');
      addField(row2, 'rot-cy', 'Center Y', 'number', group.rotation_center[1].toFixed(4), v => {
        group.rotation_center[1] = +v;
        propagateVertexEdit(group.prototype_id);
        renderOverlays();
      }, '0.001');

      // Show prototype info
      if (group.prototype_id) {
        const infoGroup = section.append('div').attr('class', 'prop-group');
        infoGroup.append('label').text('Prototype');
        infoGroup.append('span')
          .style('color', '#c3b1ff').style('font-size', '11px')
          .text(group.prototype_id + ' (edits propagate to all members)');
      }
    }

    function renderRelationshipsEditor(parent, shape) {
      if (!shape.relationships) shape.relationships = [];

      const section = parent.append('div').attr('class', 'relationship-section');
      section.append('h3').text('Relationships');

      shape.relationships.forEach((rel, idx) => {
        const row = section.append('div').attr('class', 'rel-row');

        // Type dropdown
        const typeSelect = row.append('select')
          .on('change', function() {
            rel.type = this.value;
            renderPropertyEditor(); // re-render to show/hide scale field
          });
        ['partial-form', 'scaled-copy', 'custom'].forEach(opt => {
          typeSelect.append('option').attr('value', opt).text(opt)
            .property('selected', opt === rel.type);
        });

        // Arrow indicator
        row.append('span').text('→').style('color', '#4ecdc4').style('flex-shrink', '0');

        // Target dropdown
        const targetSelect = row.append('select')
          .on('change', function() { rel.target = this.value; renderRelationshipLines(); });
        targetSelect.append('option').attr('value', '').text('(select)');
        shapes.forEach(s => {
          if (s.id !== shape.id) {
            targetSelect.append('option').attr('value', s.id).text(s.id)
              .property('selected', s.id === rel.target);
          }
        });

        // Scale field (only for scaled-copy)
        if (rel.type === 'scaled-copy') {
          row.append('input')
            .attr('type', 'number')
            .attr('step', '0.1')
            .attr('placeholder', 'scale')
            .property('value', rel.scale || '')
            .style('max-width', '55px')
            .on('input', function() { rel.scale = +this.value || null; });
        }

        // Notes
        row.append('input')
          .attr('class', 'rel-notes')
          .attr('type', 'text')
          .attr('placeholder', 'notes...')
          .property('value', rel.notes || '')
          .on('input', function() { rel.notes = this.value; });

        // Delete button
        row.append('button')
          .attr('class', 'rel-delete')
          .text('×')
          .on('click', function() {
            shape.relationships.splice(idx, 1);
            renderPropertyEditor();
            renderRelationshipLines();
          });
      });

      // Add relationship button
      section.append('button')
        .attr('class', 'btn-add-rel')
        .text('+ Add Relationship')
        .on('click', function() {
          shape.relationships.push({ type: 'partial-form', target: '', notes: '' });
          renderPropertyEditor();
        });
    }

    function addField(parent, key, label, type, value, onChange, step) {
      const group = parent.append('div').attr('class', 'prop-group');
      group.append('label').text(label);
      const input = group.append('input').attr('type', type);
      if (step) input.attr('step', step);
      input.property('value', value)
        .on('input', function() { onChange(this.value); });
    }

    function addSelect(parent, key, label, value, options, onChange) {
      const group = parent.append('div').attr('class', 'prop-group');
      group.append('label').text(label);
      const sel = group.append('select')
        .on('change', function() { onChange(this.value); });
      options.forEach(opt => {
        sel.append('option').attr('value', opt).text(opt)
          .property('selected', opt === value);
      });
    }

    function getOrderedShapeIds() {
      // Returns shape IDs in sidebar display order (grouped shapes under their group, then ungrouped)
      const ordered = [];
      const groupedIds = new Set();
      groups.forEach(g => {
        g.member_ids.forEach(mid => {
          if (shapes.find(s => s.id === mid)) { ordered.push(mid); groupedIds.add(mid); }
        });
      });
      shapes.forEach(s => { if (!groupedIds.has(s.id)) ordered.push(s.id); });
      return ordered;
    }

    function selectShape(id, event) {
      selectedVertexIndex = null;  // Clear vertex selection on shape change

      // Redirect derived group members to their prototype (force-select, no toggle)
      if (isDerivedGroupMember(id)) {
        const group = getShapeGroup(id);
        if (group && group.prototype_id) {
          selectedIds.clear();
          selectedIds.add(group.prototype_id);
          lastClickedId = group.prototype_id;
          renderAll();
          return;
        }
      }

      const metaKey = event && (event.metaKey || event.ctrlKey);
      const shiftKey = event && event.shiftKey;

      if (metaKey) {
        // Cmd/Ctrl+click: toggle this shape in/out of selection
        if (selectedIds.has(id)) {
          selectedIds.delete(id);
        } else {
          selectedIds.add(id);
        }
      } else if (shiftKey && lastClickedId && lastClickedId !== id) {
        // Shift+click: range select from lastClickedId to id
        const ordered = getOrderedShapeIds();
        const fromIdx = ordered.indexOf(lastClickedId);
        const toIdx = ordered.indexOf(id);
        if (fromIdx !== -1 && toIdx !== -1) {
          const [lo, hi] = fromIdx < toIdx ? [fromIdx, toIdx] : [toIdx, fromIdx];
          for (let i = lo; i <= hi; i++) {
            selectedIds.add(ordered[i]);
          }
        } else {
          selectedIds.clear();
          selectedIds.add(id);
        }
      } else {
        // Plain click: single-select with toggle
        if (selectedIds.size === 1 && selectedIds.has(id)) {
          selectedIds.clear();
        } else {
          selectedIds.clear();
          selectedIds.add(id);
        }
      }

      lastClickedId = id;
      renderAll();
    }

    // ============================================================
    // Add Shape Mode
    // ============================================================
    function renderPreview() {
      previewGroup.selectAll('*').remove();
      newVertices.forEach((v, i) => {
        previewGroup.append('circle')
          .attr('class', 'preview-dot')
          .attr('cx', v[0] * WIDTH).attr('cy', v[1] * HEIGHT).attr('r', 4);
        if (i > 0) {
          previewGroup.append('line')
            .attr('class', 'preview-line')
            .attr('x1', newVertices[i-1][0] * WIDTH).attr('y1', newVertices[i-1][1] * HEIGHT)
            .attr('x2', v[0] * WIDTH).attr('y2', v[1] * HEIGHT);
        }
      });
      // Close line from last to first
      if (newVertices.length > 2) {
        const first = newVertices[0], last = newVertices[newVertices.length - 1];
        previewGroup.append('line')
          .attr('class', 'preview-line')
          .attr('x1', last[0] * WIDTH).attr('y1', last[1] * HEIGHT)
          .attr('x2', first[0] * WIDTH).attr('y2', first[1] * HEIGHT);
      }
      d3.select('#status').text(`Add mode: ${newVertices.length} vertices. Click canvas to add. Click "Finish" when done (min 3).`);
    }

    d3.select('#btn-add').on('click', function() {
      if (!addMode) {
        addMode = true;
        newVertices = [];
        d3.select(this).attr('title', 'Finish Shape').classed('active', true);
        d3.select('#status').text('Add mode: click on the canvas to place vertices. Min 3.');
      } else {
        addMode = false;
        d3.select(this).attr('title', 'Add Shape').classed('active', false);
        previewGroup.selectAll('*').remove();

        if (newVertices.length >= 3) {
          const colorIdx = shapes.length % OVERLAY_COLORS.length;
          const newShape = {
            id: `shape-${Date.now()}`,
            type: 'custom',
            zone: 'transition',
            vertex_count: newVertices.length,
            count: 1,
            count_tolerance: 0,
            approximate_area_ratio: null,
            area_tolerance: 0.3,
            distance_from_center: null,
            notes: '',
            overlay_color: OVERLAY_COLORS[colorIdx],
            approximate_vertices: newVertices.slice(),
            visible: true
          };
          shapes.push(newShape);
          selectedIds.clear();
          selectedIds.add(newShape.id);
          renderAll();
          d3.select('#status').text(`Added shape "${newShape.id}" with ${newVertices.length} vertices.`);
        } else {
          d3.select('#status').text('Shape cancelled (need at least 3 vertices).');
        }
        newVertices = [];
      }
    });

    // ============================================================
    // Delete
    // ============================================================
    d3.select('#btn-delete').on('click', function() {
      if (selectedIds.size === 0) return;
      const names = [...selectedIds];
      const idsToDelete = new Set(selectedIds);
      shapes = shapes.filter(s => !idsToDelete.has(s.id));
      // Clean up groups: remove deleted members, dissolve small groups
      groups.forEach(g => {
        g.member_ids = g.member_ids.filter(id => !idsToDelete.has(id));
      });
      groups = groups.filter(g => {
        if (g.member_ids.length < 2) {
          // Dissolve: remove group ref from remaining member
          g.member_ids.forEach(id => {
            const s = shapes.find(sh => sh.id === id);
            if (s) delete s.group;
          });
          return false;
        }
        return true;
      });
      // Clean up orphaned relationships
      shapes.forEach(s => {
        if (s.relationships) {
          s.relationships = s.relationships.filter(r => !idsToDelete.has(r.target));
        }
      });
      selectedIds.clear();
      renderAll();
      d3.select('#status').text(`Deleted ${names.length} shape(s): ${names.join(', ')}.`);
    });

    // ============================================================
    // Reset — revert to initial positions
    // ============================================================
    d3.select('#btn-reset').on('click', function() {
      shapes = JSON.parse(JSON.stringify(initialShapes));
      groups = JSON.parse(JSON.stringify(initialGroups));
      selectedIds.clear();
      selectedVertexIndex = null;
      lastClickedId = null;
      renderAll();
      d3.select('#status').text('All shapes reset to initial positions.');
    });

    // ============================================================
    // Done — serialize to DOM
    // ============================================================
    d3.select('#btn-done').on('click', function() {
      const output = {
        version: '1.1',
        timestamp: new Date().toISOString(),
        pattern: patternMeta,
        zones: zones,
        shapes: shapes.map(s => {
          const out = {
            id: s.id,
            type: s.type,
            zone: s.zone,
            vertex_count: s.vertex_count,
            count: s.count,
            count_tolerance: s.count_tolerance || 0,
            approximate_area_ratio: s.approximate_area_ratio || null,
            area_tolerance: s.area_tolerance || 0.3,
            distance_from_center: s.distance_from_center || null,
            approximate_vertices: s.approximate_vertices,
            notes: s.notes || '',
          };
          if (s.group) out.group = s.group;
          if (s.relationships && s.relationships.length > 0) {
            // Filter out relationships with empty targets
            const valid = s.relationships.filter(r => r.target);
            if (valid.length > 0) {
              out.relationships = valid.map(r => {
                const rel = { type: r.type, target: r.target };
                if (r.type === 'scaled-copy' && r.scale) rel.scale = r.scale;
                if (r.notes) rel.notes = r.notes;
                return rel;
              });
            }
          }
          return out;
        }),
        feedback: document.getElementById('feedback-text').value,
      };
      // Add groups if any exist
      if (groups.length > 0) {
        output.groups = groups.map(g => {
          const out = {
            id: g.id,
            label: g.label || g.id,
            rotation_center: g.rotation_center,
            count: g.count,
            angular_spacing: g.angular_spacing,
            member_ids: g.member_ids,
          };
          if (g.prototype_id) out.prototype_id = g.prototype_id;
          return out;
        });
      }

      document.getElementById('interpretation-data').textContent = JSON.stringify(output, null, 2);

      d3.select('#btn-done').attr('title', 'Saved!').classed('saved', true);
      d3.select('#status').text('Data serialized to DOM. Claude can now extract it.');
      setTimeout(() => {
        d3.select('#btn-done').attr('title', 'Done — Serialize Output').classed('saved', false);
      }, 3000);
    });

    // ============================================================
    // Relationship lines SVG layer (between overlays and handles)
    // ============================================================
    const relationshipLineGroup = svg.insert('g', '#handles').attr('id', 'relationship-lines');

    function renderRelationshipLines() {
      relationshipLineGroup.selectAll('*').remove();
      const primaryShape = primarySelectedShape();
      if (!primaryShape || !primaryShape.relationships) return;

      primaryShape.relationships.forEach(rel => {
        if (!rel.target) return;
        const target = shapes.find(s => s.id === rel.target);
        if (!target || target.visible === false) return;

        const fromC = computeCentroid(primaryShape);
        const toC = computeCentroid(target);

        // Dotted teal line
        relationshipLineGroup.append('line')
          .attr('x1', fromC[0] * WIDTH).attr('y1', fromC[1] * HEIGHT)
          .attr('x2', toC[0] * WIDTH).attr('y2', toC[1] * HEIGHT)
          .attr('stroke', '#4ecdc4')
          .attr('stroke-width', 1.5)
          .attr('stroke-dasharray', '6,4')
          .attr('opacity', 0.8);

        // Label at midpoint
        const mx = (fromC[0] + toC[0]) / 2 * WIDTH;
        const my = (fromC[1] + toC[1]) / 2 * HEIGHT;
        relationshipLineGroup.append('text')
          .attr('x', mx).attr('y', my - 4)
          .attr('text-anchor', 'middle')
          .attr('fill', '#4ecdc4')
          .attr('font-size', '10px')
          .attr('font-family', 'inherit')
          .text(rel.type);
      });
    }

    // ============================================================
    // Toolbar state management
    // ============================================================
    function updateToolbarState() {
      const hasSelection = selectedIds.size > 0;

      // Delete and Deselect: enabled when anything is selected
      d3.select('#btn-delete').property('disabled', !hasSelection);
      d3.select('#btn-deselect').property('disabled', !hasSelection);

      // Selection count badge
      const badge = d3.select('#selection-badge');
      if (selectedIds.size > 1) {
        badge.text(selectedIds.size + ' selected').classed('visible', true);
      } else {
        badge.classed('visible', false);
      }

      // Group button: enabled when 2+ ungrouped shapes selected, or when in picking mode
      if (pickingCenterMode) {
        d3.select('#btn-group').property('disabled', false).classed('active', true);
      } else {
        const ungroupedSelected = [...selectedIds].filter(id => {
          const s = shapes.find(sh => sh.id === id);
          return s && !s.group;
        });
        d3.select('#btn-group').property('disabled', ungroupedSelected.length < 2).classed('active', false);
      }

      // Ungroup button: enabled when any selected shape is grouped
      const anyGrouped = [...selectedIds].some(id => {
        const s = shapes.find(sh => sh.id === id);
        return s && s.group;
      });
      d3.select('#btn-ungroup').property('disabled', !anyGrouped);
    }

    // ============================================================
    // Deselect All
    // ============================================================
    d3.select('#btn-deselect').on('click', function() {
      if (pickingCenterMode) {
        exitPickingCenterMode();
      }
      selectedIds.clear();
      lastClickedId = null;
      selectedVertexIndex = null;
      renderAll();
      d3.select('#status').text('Selection cleared.');
    });

    // ============================================================
    // Group as Rotations
    // ============================================================
    d3.select('#btn-group').on('click', function() {
      // If already in picking mode, cancel
      if (pickingCenterMode) {
        exitPickingCenterMode();
        d3.select('#status').text('Group creation cancelled.');
        return;
      }

      const memberIds = [...selectedIds].filter(id => {
        const s = shapes.find(sh => sh.id === id);
        return s && !s.group;
      });
      if (memberIds.length < 2) return;

      // Enter center-picking mode
      pickingCenterMode = true;
      pendingGroupMembers = memberIds;
      d3.select(this).classed('active', true);
      d3.select('#main-svg').classed('picking-center-mode', true);
      d3.select('#status').text('Click a shape to set as rotation center.');
      renderOverlays();  // Re-render to attach pick handlers
    });

    function createGroupWithCenter(centerShape) {
      const memberIds = pendingGroupMembers;
      const count = memberIds.length;
      const angularSpacing = +(360 / count).toFixed(2);

      // Rotation center = centroid of the clicked shape
      const center = computeCentroid(centerShape);

      // All members adopt first shape's overlay color
      const firstShape = shapes.find(s => s.id === memberIds[0]);
      const color = firstShape.overlay_color;

      const groupId = `group-${Date.now()}`;
      const group = {
        id: groupId,
        label: groupId,
        rotation_center: center,
        count: count,
        angular_spacing: angularSpacing,
        member_ids: memberIds,
        prototype_id: memberIds[0],
        _collapsed: false
      };
      groups.push(group);

      // Set group ref and color on each member
      memberIds.forEach(id => {
        const s = shapes.find(sh => sh.id === id);
        s.group = groupId;
        s.overlay_color = color;
      });

      // Exit picking mode
      pickingCenterMode = false;
      pendingGroupMembers = [];
      d3.select('#btn-group').classed('active', false);
      d3.select('#main-svg').classed('picking-center-mode', false);

      // Propagate prototype to all other members
      propagateVertexEdit(memberIds[0]);

      // Select prototype
      selectedIds.clear();
      selectedIds.add(memberIds[0]);
      renderAll();
      d3.select('#status').text(`Created group "${groupId}" with ${count} shapes. Center: "${centerShape.id}".`);
    }

    // ============================================================
    // Ungroup
    // ============================================================
    d3.select('#btn-ungroup').on('click', function() {
      const groupIdsToRemove = new Set();
      [...selectedIds].forEach(id => {
        const s = shapes.find(sh => sh.id === id);
        if (s && s.group) groupIdsToRemove.add(s.group);
      });
      groupIdsToRemove.forEach(gid => {
        const g = getGroup(gid);
        if (g) {
          g.member_ids.forEach(id => {
            const s = shapes.find(sh => sh.id === id);
            if (s) delete s.group;
          });
        }
      });
      groups = groups.filter(g => !groupIdsToRemove.has(g.id));
      renderAll();
      d3.select('#status').text(`Ungrouped ${groupIdsToRemove.size} group(s).`);
    });

    // ============================================================
    // Edit Propagation — rotate vertex edits to other group members
    // ============================================================
    function propagateVertexEdit(shapeId) {
      const shape = shapes.find(s => s.id === shapeId);
      if (!shape || !shape.group) return;
      const group = getGroup(shape.group);
      if (!group) return;

      // Only propagate from the prototype
      if (group.prototype_id && group.prototype_id !== shapeId) return;

      const cx = group.rotation_center[0];
      const cy = group.rotation_center[1];
      const memberIdx = group.member_ids.indexOf(shapeId);
      if (memberIdx < 0) return;

      // For each other member, compute rotated vertex positions
      group.member_ids.forEach((otherId, k) => {
        if (otherId === shapeId) return;
        const otherShape = shapes.find(s => s.id === otherId);
        if (!otherShape) return;

        const angleDeg = (k - memberIdx) * group.angular_spacing;
        const angleRad = angleDeg * Math.PI / 180;
        const cosA = Math.cos(angleRad);
        const sinA = Math.sin(angleRad);

        // Match vertex count to prototype
        while (otherShape.approximate_vertices.length < shape.approximate_vertices.length) {
          otherShape.approximate_vertices.push([0, 0]);
        }
        while (otherShape.approximate_vertices.length > shape.approximate_vertices.length) {
          otherShape.approximate_vertices.pop();
        }
        otherShape.vertex_count = shape.vertex_count;

        shape.approximate_vertices.forEach((v, vi) => {
          // Rotate vertex around center
          const dx = v[0] - cx;
          const dy = v[1] - cy;
          otherShape.approximate_vertices[vi][0] = cx + dx * cosA - dy * sinA;
          otherShape.approximate_vertices[vi][1] = cy + dx * sinA + dy * cosA;
        });
      });
    }

    // Hook propagation into vertex drag end
    const origDragEnd = drag.on('end');
    drag.on('end', function(event, d) {
      d3.select(this).attr('stroke-width', 2);
      propagateVertexEdit(d.shapeId);
      renderOverlays();
      renderRelationshipLines();
    });

    // Hook propagation into whole-shape drag end
    const origShapeDragEnd = shapeDrag.on('end');
    shapeDrag.on('end', function(event, d) {
      if (!d._didMove) {
        selectedIds.clear();
        renderAll();
      } else {
        propagateVertexEdit(d.shape.id);
        renderOverlays();
        renderRelationshipLines();
      }
    });

    // ============================================================
    // Initial render
    // ============================================================
    renderAll();
    d3.select('#status').text(`Loaded ${shapes.length} shapes. Click to select, drag handles to adjust. Click + to add vertex, shift-click handle to remove.`);
  </script>
</body>
</html>
