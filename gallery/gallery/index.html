<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Sacred Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1929;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .gallery-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .gallery-header h1 {
            font-size: 2.5rem;
            color: #7dd6e0;
            margin-bottom: 0.5rem;
        }

        .gallery-header p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .gallery-header a {
            color: #4a6ba5;
            text-decoration: none;
        }

        .gallery-header a:hover {
            color: #7dd6e0;
        }

        /* Section Divider */
        .section-title {
            color: #5fb5c4;
            font-size: 1.3rem;
            margin: 2.5rem 0 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1e3a5f;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background: #0f2744;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #7dd6e0;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #1a2c4d;
        }

        .card-body {
            padding: 1.25rem;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 0.5rem;
        }

        .card-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-symmetry { background: #2d4a7c; color: #7dd6e0; }
        .badge-confidence { background: #4a2d7c; color: #c07de0; }
        .badge-type { background: #7c2d4a; color: #e07da0; }
        .badge-drawing { background: #2d7c4a; color: #7de0a0; }

        /* Nav */
        .nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }

        .nav a:hover, .nav a.active {
            background: #1e3a5f;
            color: #7dd6e0;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 0;
            color: #5a5a5a;
            font-size: 0.85rem;
            border-top: 1px solid #1e3a5f;
            margin-top: 3rem;
        }

        .footer a { color: #4a6ba5; text-decoration: none; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #5a5a5a;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-header h1 { font-size: 1.8rem; }
            .container { padding: 1rem; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="gallery-header">
            <h1>Sacred Patterns Gallery</h1>
            <p>Islamic geometric patterns studied and generated by
                <a href="../index.html">Sacred Patterns</a></p>
        </div>

        <!-- Navigation -->
        <div class="nav">
            <a href="../index.html">Pattern Viewer</a>
            <a href="index.html" class="active">Gallery</a>
        </div>

        <!-- Learning Sessions -->
        <h2 class="section-title">Learning Sessions</h2>
        <div class="card-grid" id="sessions-grid">
            <!-- Session cards injected here -->
        </div>

        <!-- Creative Drawings -->
        <h2 class="section-title">Creative Drawings</h2>
        <div class="card-grid" id="drawings-grid">
            <!-- Drawing cards injected here -->
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="https://art.bytesofpurpose.com/">art.bytesofpurpose.com</a>
        </div>
    </div>

    <script>
        // === Gallery Data (injected during generation) ===
        var sessions = [{"name":"session-1","url":"session-1/index.html","pattern_type":"medallion","symmetry_group":"D10","confidence_score":0.84,"status":"in-progress","thumbnail":"session-1/iterations/42/screenshot.png","timelapse_gif":""},{"name":"session-8-fold","url":"session-8-fold/index.html","pattern_type":"rosette","symmetry_group":"D8","confidence_score":0.6,"status":"completed","thumbnail":"","timelapse_gif":""}];
        var drawings = [];

        function createCard(item, type) {
            var card = document.createElement('a');
            card.className = 'card';
            card.href = item.url;

            var badges = '';
            if (item.symmetry_group) {
                badges += '<span class="badge badge-symmetry">' + item.symmetry_group + '</span>';
            }
            if (item.confidence_score !== undefined) {
                badges += '<span class="badge badge-confidence">' +
                    Math.round(item.confidence_score * 100) + '%</span>';
            }
            if (type === 'session' && item.pattern_type) {
                badges += '<span class="badge badge-type">' + item.pattern_type + '</span>';
            }
            if (type === 'drawing') {
                badges += '<span class="badge badge-drawing">Drawing</span>';
            }

            var imgAttrs = 'class="card-image" src="' + (item.thumbnail || '') + '" alt="' + item.name + '"';
            if (item.timelapse_gif) {
                imgAttrs += ' data-gif="' + item.timelapse_gif + '"'
                    + ' data-static="' + (item.thumbnail || '') + '"'
                    + ' onmouseenter="if(this.dataset.gif) this.src=this.dataset.gif"'
                    + ' onmouseleave="if(this.dataset.static) this.src=this.dataset.static"';
            }

            card.innerHTML =
                '<img ' + imgAttrs + '>' +
                '<div class="card-body">' +
                    '<div class="card-title">' + item.name + '</div>' +
                    '<div class="card-badges">' + badges + '</div>' +
                '</div>';

            return card;
        }

        // Render session cards
        var sessionsGrid = document.getElementById('sessions-grid');
        if (sessions.length === 0) {
            sessionsGrid.innerHTML = '<div class="empty-state"><p>No learning sessions yet.</p></div>';
        } else {
            sessions.forEach(function(s) {
                sessionsGrid.appendChild(createCard(s, 'session'));
            });
        }

        // Render drawing cards
        var drawingsGrid = document.getElementById('drawings-grid');
        if (drawings.length === 0) {
            drawingsGrid.innerHTML = '<div class="empty-state"><p>No creative drawings yet.</p></div>';
        } else {
            drawings.forEach(function(d) {
                drawingsGrid.appendChild(createCard(d, 'drawing'));
            });
        }
    </script>
</body>
</html>
