<svg xmlns="http://www.w3.org/2000/svg" width="300" height="320" viewBox="0 0 300 320">
  <!-- Option 3: accept the flat sparse bordered look as the final deliverable.
       The approved structure ships as-is — colored tiles with thin outline borders,
       no over/under weave. Honest about the gap: this is NOT the reference's dense
       woven disc, but it's a clean, finished, shippable pattern. -->
  <rect width="300" height="320" fill="#ffffff"/>
  <!-- the disjoint tiles with a clean flat border, white space stays -->
  <g fill="#1a3a7a" stroke="#FCFDFD" stroke-width="3">
    <polygon points="80,70 95,60 110,70 110,90 95,100 80,90"/>
    <polygon points="190,70 205,60 220,70 220,90 205,100 190,90"/>
    <polygon points="135,180 150,170 165,180 165,200 150,210 135,200"/>
    <polygon points="80,150 95,140 110,150 110,170 95,180 80,170"/>
    <polygon points="190,150 205,140 220,150 220,170 205,180 190,170"/>
  </g>
  <text x="150" y="240" font-family="sans-serif" font-size="13" fill="#888" text-anchor="middle">flat outlined tiles — clean + finished</text>
  <text x="150" y="295" font-family="sans-serif" font-size="13" fill="#c0392b" text-anchor="middle">no weave, white space stays — not the reference</text>
</svg>
